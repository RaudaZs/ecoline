<title>Ecoline — Түс Таңдағыш</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f0f0;color:#222}
.page{max-width:1200px;margin:32px auto;padding:0 20px}
.viz-title{font-size:22px;font-weight:700;margin-bottom:4px}
.viz-sub{font-size:13px;color:#888;margin-bottom:20px}
.viz-layout{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}

/* PREVIEW */
.preview-wrap{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.15);background:#f5f2ee;max-height:540px;min-height:540px;display:flex;align-items:center;justify-content:center}
.room-img{width:100%;display:block;transition:opacity 0.4s;object-fit:contain;max-height:520px;margin:0 auto}
.room-img.fading{opacity:0.2}
.load-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#c8102e,#ff6b6b,#c8102e);background-size:200%;animation:sh 1s infinite;display:none;z-index:5}
.load-bar.on{display:block}
@keyframes sh{0%{background-position:200%}100%{background-position:-200%}}
.color-badge{position:absolute;bottom:14px;left:14px;background:rgba(255,255,255,.96);border-radius:8px;padding:8px 14px;display:none;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.15);backdrop-filter:blur(8px);z-index:4}
.badge-dot{width:28px;height:28px;border-radius:6px;border:2px solid #eee}
.badge-name{font-size:13px;font-weight:700}
.badge-code{font-size:11px;color:#888}

/* ПАНЕЛЬ */
.panel{display:flex;flex-direction:column;gap:12px}
.box{background:#fff;border-radius:10px;padding:16px;border:1px solid #eee}
.box-lbl{font-size:10px;font-weight:700;color:#aaa;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px}
.sel-empty{text-align:center;color:#ccc;padding:16px;font-size:13px;min-height:222px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sel-sw{width:100%;height:72px;border-radius:7px;border:2px solid #eee;margin-bottom:10px;transition:background .3s;display:flex;align-items:center;justify-content:center;font-size:22px}
.sel-name{font-size:15px;font-weight:700;margin-bottom:2px}
.sel-code{font-size:12px;color:#888;margin-bottom:4px}
.sel-hex{font-family:monospace;font-size:11px;background:#f5f5f5;padding:2px 7px;border-radius:4px;display:inline-block;color:#555;margin-bottom:10px}
.btn-wa{background:#25D366;color:#fff;border:none;padding:10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .2s}
.btn-wa:hover{background:#1daf55}
.btn-cp{background:#fff;color:#555;border:1.5px solid #ddd;padding:8px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;width:100%;transition:all .2s}
.btn-cp:hover{border-color:#c8102e;color:#c8102e}

/* БӨЛМЕ БАТЫРМАЛАРЫ */
.room-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.rt{border:1.5px solid #ddd;background:#fff;padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.rt:hover{border-color:#c8102e}
.rt.on{border-color:#c8102e;background:#c8102e;color:#fff}

/* КАТ */
.cats{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.ct{border:1.5px solid #ddd;background:#fff;padding:3px 9px;border-radius:14px;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.ct:hover,.ct.on{border-color:#c8102e;background:#c8102e;color:#fff}
.sw-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}
.sw{aspect-ratio:1;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform .18s,box-shadow .18s}
.sw:hover{transform:scale(1.2);box-shadow:0 3px 8px rgba(0,0,0,.2);z-index:5;border-color:rgba(255,255,255,.7)}
.sw.on{border-color:#c8102e!important;transform:scale(1.12);box-shadow:0 0 0 2px rgba(200,16,46,.3);z-index:5}


.site-header{background:#fff;border-bottom:2px solid #C8102E;position:sticky;top:0;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hd-inner{width:100%;padding:0 40px 0 16px;display:flex;justify-content:flex-start;align-items:center;height:140px;gap:0}
.hd-logo{display:flex;align-items:center;margin-right:32px;flex-shrink:0;text-decoration:none}
.hd-nav{display:flex;align-items:stretch;height:100%;flex:1;gap:4px;margin-left:auto}
.hd-nav a{color:#6b7280;padding:0 16px;height:100%;display:flex;align-items:center;font-size:14px;font-weight:600;text-decoration:none;transition:.15s;white-space:nowrap;border-bottom:3px solid transparent}
.hd-nav a:hover{color:#C8102E}
.hd-nav a.active{color:#C8102E;border-bottom-color:#C8102E}
.hd-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.hd-wa{background:#25D366;color:#fff;padding:8px 16px;border-radius:4px;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:6px}
.hd-wa:hover{background:#1daf55;color:#fff}
@media(max-width:640px){.hd-nav{display:none}}
</style>
</head>

// Ең жақын фотоны табу
function nearestPhoto(hex, room) {
  const r=parseInt(hex.slice(1,3),16),
        g=parseInt(hex.slice(3,5),16),
        b=parseInt(hex.slice(5,7),16);
  const colors = ROOM_MAP[room]?.colors || [];
  if(!colors.length) return ROOM_MAP[room]?.default || '';
  let best=colors[0].src, min=Infinity;
  colors.forEach(({rgb:[cr,cg,cb],src}) => {
    const d=Math.sqrt((r-cr)**2+(g-cg)**2+(b-cb)**2);
    if(d<min){min=d;best=src;}
  });
  return best;
}

function showPhoto(src) {
  if(!src) return;
  // Бос орынды URL encode жасау
  src = src.replace(/ /g, '%20');
  const img = document.getElementById('room-img');
  img.classList.add('fading');
  document.getElementById('lb').classList.add('on');
  const tmp = new Image();
  tmp.onload = () => {
    img.src = src;
    img.classList.remove('fading');
    document.getElementById('lb').classList.remove('on');
  };
  tmp.onerror = () => {
    img.classList.remove('fading');
    document.getElementById('lb').classList.remove('on');
  };
  tmp.src = src;
}

let visibleCount = 108;

function showMore() {
  visibleCount += 108;
  render(true);
}

function render(keepScroll) {
  const q = (document.getElementById('sw-search')?.value || '').toUpperCase();
  const avail = AVAILABLE[curRoom];
  let list = NOVA_COLORS.filter(x => 
    (cat === 'all' || x.t === cat) && 
    (!q || x.c.includes(q)) &&
    (!avail || avail.includes(x.c))
  );
  const total = list.length;
  const shown = list.slice(0, visibleCount);
  document.getElementById('grid').innerHTML = shown.map(x=>`
    <div class="sw ${sel&&sel.c===x.c?'on':''}"
      style="background:${x.h}"
      onclick="pick('${x.c}')"
      title="${x.c}"></div>`).join('');
  const moreBtn = document.getElementById('grid-more');
  if(total > visibleCount) {
    moreBtn.style.display = 'block';
    moreBtn.querySelector('button').textContent = `Көбірек көрсету ▼ (${total - visibleCount} қалды)`;
  } else {
    moreBtn.style.display = 'none';
  }
}

function pick(code) {
  sel = NOVA_COLORS.find(x=>x.c===code);
  if(!sel) return;
  showPhoto('assets/downlowds/output/' + (FOLDER[curRoom]||curRoom) + '/' + (FILE_PREFIX[curRoom]||curRoom) + sel.c + '.webp');

}

// Ағымдағы бөлме фотоларын алдын ала жүктеу (preload)
function preloadRoomPhotos(room) {
  const codes = AVAILABLE[room] || [];
  const folder = FOLDER[room] || room;
  const prefix = FILE_PREFIX[room] || room;
  codes.forEach(code => {
    const img = new Image();
    img.src = ('assets/downlowds/output/' + folder + '/' + prefix + code + '.webp').replace(/ /g, '%20');
  });
}
