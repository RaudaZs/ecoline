<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA 2024 — Түстер каталогы | Ecoline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#C8102E;--text:#1f2937;--text2:#6b7280;--border:#e5e7eb;--light:#f9fafb}
body{font-family:'Source Sans 3','Segoe UI',sans-serif}
.site-header{background:#fff;border-bottom:2px solid var(--red);position:sticky;top:0;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hd-inner{width:100%;padding:0 40px 0 16px;display:flex;justify-content:flex-start;align-items:center;height:140px;gap:0}
.hd-logo{display:flex;align-items:center;margin-right:32px;flex-shrink:0;text-decoration:none}
.hd-nav{display:flex;align-items:stretch;height:100%;flex:1;gap:4px;margin-left:auto}
.hd-nav a{color:var(--text2);padding:0 16px;height:100%;display:flex;align-items:center;font-size:14px;font-weight:600;text-decoration:none;transition:.15s;white-space:nowrap;border-bottom:3px solid transparent}
.hd-nav a:hover{color:var(--red)}
.hd-nav a.active{color:var(--red);border-bottom-color:var(--red)}
.hd-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.hd-wa{background:#25D366;color:#fff;padding:8px 16px;border-radius:4px;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:6px}
.hd-wa:hover{background:#1daf55;color:#fff}
@media(max-width:640px){
  .hd-nav{display:none}
  .hd-inner{padding:0 16px}
}

:root{--red:#C8102E;--dark:#1d3557;--border:#e5e7eb;--bg:#f9fafb}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#1f2937}
.header{background:#fff;border-bottom:2px solid var(--red);padding:10px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);min-height:140px}
.logo{font-weight:800;font-size:20px;color:var(--red);letter-spacing:1px}
.header-title{font-size:15px;font-weight:600;color:#374151}
.header-sub{font-size:12px;color:#9ca3af;margin-left:auto}
.container{max-width:1400px;margin:0 auto;padding:24px}
.controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;background:#fff;padding:16px;border-radius:10px;border:1px solid var(--border)}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;padding:9px 16px 9px 36px;border:1px solid var(--border);border-radius:6px;font-size:14px;outline:none;font-family:inherit}
.search-wrap input:focus{border-color:var(--red)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:#9ca3af}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{background:#fff;border:1px solid var(--border);padding:7px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;color:#374151}
.fbtn:hover,.fbtn.active{background:var(--red);border-color:var(--red);color:#fff}
.count{font-size:12px;color:#6b7280;font-weight:500;white-space:nowrap}
.preview{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;display:grid;grid-template-columns:160px 1fr;gap:20px;align-items:center}
.prev-swatch{height:120px;border-radius:8px;border:1px solid rgba(0,0,0,.08);transition:background .3s}
.prev-code{font-size:26px;font-weight:800;color:#111;margin-bottom:6px}
.prev-hex{font-family:monospace;background:#f3f4f6;padding:4px 10px;border-radius:4px;font-size:13px;color:#374151;display:inline-block;margin-bottom:14px}
.btn-order{background:var(--red);color:#fff;border:none;padding:11px 22px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.btn-order:hover{background:#a50d25}
.prev-note{font-size:11px;color:#9ca3af;margin-top:10px;font-style:italic;max-width:400px;line-height:1.5}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.card{background:#fff;border:2px solid transparent;border-radius:8px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.1)}
.card.active{border-color:var(--red);box-shadow:0 0 0 2px rgba(200,16,46,.2)}
.swatch{height:64px;width:100%}
.card-info{padding:6px;text-align:center}
.card-code{font-size:10px;font-weight:700;color:#374151}
.empty{grid-column:1/-1;text-align:center;padding:40px;color:#9ca3af}
@media(max-width:640px){
  .preview{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px}
  .header-sub{display:none}
}
</style>
</head>

function setF(f,btn){
  filt=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const q=document.getElementById('search').value.toUpperCase();
  const list=COLORS.filter(c=>(!q||c.code.includes(q))&&(filt==='all'||c.category===filt));
  document.getElementById('count').textContent=list.length+' '+(TR[curLang]||TR.kk).suffix;
  document.getElementById('grid').innerHTML=list.length?list.map(c=>`
    <div class="card ${c.code===sel?'active':''}" onclick="pick('${c.code}')">
      <div class="swatch" style="background:${c.hex}"></div>
      <div class="card-info"><div class="card-code">${c.code}</div></div>
    </div>`).join(''):'<div class="empty">'+(TR[curLang]||TR.kk).empty+'</div>';
}

function pick(code){
  const c=COLORS.find(x=>x.code===code);
  if(!c)return;
  sel=code;
  document.getElementById('pSwatch').style.background=c.hex;
  document.getElementById('pCode').textContent=c.code;
  document.getElementById('pHex').textContent=c.hex;
  render();
  document.querySelector('.preview').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function orderColor(){
  const c=COLORS.find(x=>x.code===sel);
  const msg=encodeURIComponent((TR[curLang]||TR.kk).wa.replace('{code}',c.code).replace('{hex}',c.hex));
  window.open('https://wa.me/77770050757?text='+msg,'_blank');
}

let curLang='kk';
function setNovaLang(lang){
  curLang=lang;
  const T=TR[lang]||TR.kk;
  document.querySelector('.header-title').textContent=T.title;
  document.querySelector('.header-sub').textContent=T.sub;
  document.querySelector('.btn-order').textContent=T.order;
  document.querySelector('.prev-note').textContent=T.note;
  document.getElementById('search').placeholder=T.search;
  const btns=document.querySelectorAll('.fbtn');
  const keys=['all','blue','green','warm','purple','grey','light','deep'];
  btns.forEach((b,i)=>{if(keys[i]&&T[keys[i]])b.textContent=T[keys[i]];});
  render();
}
window.addEventListener('message',function(e){
  if(e.data&&e.data.lang){setNovaLang(e.data.lang);}
});
try{if(window.parent&&window.parent.currentLang)setNovaLang(window.parent.currentLang);}catch(e){}

render();
